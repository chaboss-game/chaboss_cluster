syntax = "proto3";

package cluster;

// Basic types

message WorkerId {
  string host = 1;
  int32 port = 2;
}

enum WorkerStatus {
  WORKER_STATUS_ONLINE = 0;
  WORKER_STATUS_OFFLINE = 1;
  WORKER_STATUS_UNSTABLE = 2;
  WORKER_STATUS_RECONNECTING = 3;
}

message GpuInfo {
  int32 index = 1;
  string name = 2;
  int32 total_vram_mb = 3;
  string compute_capability = 4;
  string backend = 5; // cuda | rocm | other
}

message ResourceInfo {
  int32 cpu_cores = 1;
  int32 ram_total_mb = 2;
  int32 ram_available_mb = 3;
  repeated GpuInfo gpus = 4;
  string torch_version = 5;
  string cuda_version = 6;
  string rocm_version = 7;
  string os_name = 8;     // linux | windows | darwin | ...
  string os_version = 9;  // kernel/build/version string
}

message WorkerDescriptor {
  WorkerId id = 1;
  WorkerStatus status = 2;
  ResourceInfo resources = 3;
  string token_fingerprint = 4; // short hash, not the token itself
  string token_status = 5;      // OK | MISMATCH | NONE | UNKNOWN
}

// Tensor transport

message TensorMeta {
  string dtype = 1;
  repeated int64 shape = 2;
  string device = 3;
}

message TensorPayload {
  TensorMeta meta = 1;
  bytes data = 2;
}

// Sharding

message ShardSpec {
  string model_id = 1;
  string shard_id = 2;
  string backend = 3; // baseline | accelerate | deepspeed
}

message InitShardRequest {
  ShardSpec spec = 1;
  string weight_source = 2; // hf | shared_path | inline_blob
  string hf_model_name = 3;
  string shared_path = 4;
  bytes inline_blob = 5;
  repeated string shard_keys = 6; // если задано — воркер загружает только эти ключи state_dict
}

message InitShardResponse {
  bool ok = 1;
  string error = 2;
}

message UnloadShardRequest {
  string model_id = 1;   // пусто = все модели
  string shard_id = 2;   // пусто = все шарды модели (или все при пустом model_id)
}

message UnloadShardResponse {
  bool ok = 1;
  string error = 2;
}

// Health / heartbeat

message HealthPing {
  WorkerId id = 1;
  string nonce = 2;
}

message HealthPong {
  WorkerId id = 1;
  string nonce = 2;
  WorkerStatus status = 3;
}

// Pipeline execution

message StageRequest {
  string request_id = 1;
  TensorPayload tensor = 2;
  bool is_last = 3;
  string model_id = 4;   // для выбора модуля на воркере
  string shard_id = 5;
}

message StageResponse {
  string request_id = 1;
  TensorPayload tensor = 2;
  bool is_last = 3;
  string error = 4;
}

// Worker-side service, called by master.

message GetLoadProgressResponse {
  LoadProgress progress = 1;
}

message RemoteUpdateRequest {
  bool restart_gui = 1;       // перезапустить GUI на воркере (если запущен)
  bool start_worker = 2;      // передать флаг --start-worker при рестарте GUI
  string git_remote = 3;      // default "origin"
  string git_branch = 4;      // default: текущая
}

message RemoteUpdateResponse {
  bool ok = 1;
  string error = 2;
  string output = 3;         // stdout/stderr git pull + доп. сообщения
}

message GetWorkerLogsRequest {
  int64 since_index = 1;     // 0 = все доступные
}

message GetWorkerLogsResponse {
  repeated string lines = 1;
  int64 next_index = 2;
}

service WorkerService {
  rpc GetStatus(WorkerId) returns (WorkerDescriptor);
  rpc GetLoadProgress(WorkerId) returns (GetLoadProgressResponse);
  rpc InitShard(InitShardRequest) returns (InitShardResponse);
  rpc UnloadShard(UnloadShardRequest) returns (UnloadShardResponse);
  rpc RunStage(stream StageRequest) returns (stream StageResponse);
  rpc HealthStream(stream HealthPing) returns (stream HealthPong);
  rpc RemoteUpdate(RemoteUpdateRequest) returns (RemoteUpdateResponse);
  rpc GetWorkerLogs(GetWorkerLogsRequest) returns (GetWorkerLogsResponse);
  // Клиентский стрим: мастер отправляет заголовок сообщения + чанки вложений.
  rpc ReceiveChatMessage(stream ChatPostChunk) returns (ReceiveChatMessageResponse);
}

// Admin API (master-side), for UI and external tools.

message Empty {}

message WorkerList {
  repeated WorkerDescriptor workers = 1;
}

message LoadModelRequest {
  string hf_model_id = 1;  // e.g. "bert-base-uncased" or "org/repo"
}

message LoadModelResponse {
  bool ok = 1;
  string error = 2;
}

// Прогресс загрузки (мастер или воркер)
message LoadProgress {
  string stage = 1;           // "download" | "sharding" | "worker_N" | "done"
  int32 percent = 2;          // 0-100
  int64 bytes_downloaded = 3;
  int64 bytes_total = 4;
  string current_file = 5;
}

// Событие потока прогресса загрузки модели
message LoadModelProgressEvent {
  LoadProgress master = 1;
  map<string, LoadProgress> workers = 2;  // key = "host:port"
  bool done = 3;                           // последнее сообщение
  bool ok = 4;
  string error = 5;
}

message WorkerEndpoint {
  string host = 1;
  int32 port = 2;
  string auth_token = 3;
}

message UpdateWorkersConfigRequest {
  repeated WorkerEndpoint workers = 1;
}

message UpdateWorkersConfigResponse {
  bool ok = 1;
  string error = 2;
}

message RemoteUpdateWorkersRequest {
  bool restart_gui = 1;
  bool start_worker = 2;
  string git_remote = 3;
  string git_branch = 4;
}

message RemoteWorkerUpdateResult {
  string worker = 1;  // "host:port"
  bool ok = 2;
  string error = 3;
  string output = 4;
}

message RemoteUpdateWorkersResponse {
  repeated RemoteWorkerUpdateResult results = 1;
  bool ok = 2;
  string error = 3;
}

message UnloadModelRequest {
  string model_id = 1;  // пусто = выгрузить текущую загруженную модель со всех воркеров
}

message UnloadModelResponse {
  bool ok = 1;
  string error = 2;
}

message GetClusterLogsRequest {
  int64 master_since = 1;
  map<string, int64> worker_since = 2;  // key "host:port" -> since_index
}

message WorkerLogsChunk {
  repeated string lines = 1;
  int64 next_index = 2;
}

message GetClusterLogsResponse {
  repeated string master_lines = 1;
  int64 master_next = 2;
  map<string, WorkerLogsChunk> worker_logs = 3;  // key "host:port" -> chunk
}

service MasterAdminService {
  rpc ListWorkers(Empty) returns (WorkerList);
  rpc LoadModel(LoadModelRequest) returns (LoadModelResponse);
  rpc LoadModelStream(LoadModelRequest) returns (stream LoadModelProgressEvent);
  rpc UnloadModel(UnloadModelRequest) returns (UnloadModelResponse);
  rpc UpdateWorkersConfig(UpdateWorkersConfigRequest) returns (UpdateWorkersConfigResponse);
  rpc RemoteUpdateWorkers(RemoteUpdateWorkersRequest) returns (RemoteUpdateWorkersResponse);
  rpc GetClusterLogs(GetClusterLogsRequest) returns (GetClusterLogsResponse);
  // Чат
  rpc ListChatChannels(Empty) returns (ChatChannelsResponse);
  rpc MutateChatChannels(ChatChannelsMutationRequest) returns (ChatChannelsResponse);
  rpc PostChatMessage(stream ChatPostChunk) returns (PostChatMessageResponse);
  rpc GetChatHistory(GetChatHistoryRequest) returns (ChatHistoryResponse);
  rpc GetChatAttachment(GetChatAttachmentRequest) returns (stream ChatAttachmentChunk);
}

// =========================
// Chat (channels/messages/files)
// =========================

message ChatChannelInfo {
  string id = 1;
  string name = 2;
}

message ChatChannelsResponse {
  repeated ChatChannelInfo channels = 1;
}

enum ChatChannelMutationType {
  CHAT_CHANNEL_CREATE = 0;
  CHAT_CHANNEL_RENAME = 1;
  CHAT_CHANNEL_DELETE = 2;
}

message ChatChannelMutation {
  ChatChannelMutationType type = 1;
  string channel_id = 2;
  string name = 3;
}

message ChatChannelsMutationRequest {
  repeated ChatChannelMutation ops = 1;
}

message ChatPostAttachmentMeta {
  string attachment_id = 1;
  string filename = 2;
  string mime_type = 3;
  bool is_image = 4;
  int64 size = 5;
  // Для image/* пересылаем миниатюру (JPEG) прямо в заголовке, чтобы GUI не делало вычисления.
  bytes thumbnail_jpeg = 6;
}

message ChatPostHeader {
  string message_id = 1;
  int64 timestamp_ms = 2;
  string channel_id = 3;
  string sender = 4;
  string text = 5;
  // Только выбранные воркеры (host:port), которым мастер должен переслать вложения/сообщение.
  repeated string target_worker_keys = 6;
  repeated ChatPostAttachmentMeta attachments = 7;
}

message ChatPostAttachmentChunk {
  string attachment_id = 1;
  bytes data = 2;
  bool is_last = 3;
}

message ChatPostChunk {
  oneof payload {
    ChatPostHeader header = 1;
    ChatPostAttachmentChunk attachment_chunk = 2;
  }
}

message ReceiveChatMessageResponse {
  bool ok = 1;
  string error = 2;
  string message_id = 3;
}

message PostChatMessageResponse {
  bool ok = 1;
  string error = 2;
  string message_id = 3;
}

message ChatAttachmentMeta {
  string attachment_id = 1;
  string filename = 2;
  string mime_type = 3;
  bool is_image = 4;
  int64 size = 5;
  bytes thumbnail_jpeg = 6; // может быть пустым для не-фото
}

message ChatMessage {
  string message_id = 1;
  int64 seq = 2;
  int64 timestamp_ms = 3;
  string channel_id = 4;
  string sender = 5;
  string text = 6;
  repeated ChatAttachmentMeta attachments = 7;
}

message GetChatHistoryRequest {
  string channel_id = 1;
  int64 since_seq = 2; // 0 = от начала буфера
  int32 limit = 3;    // максимум сообщений
}

message ChatHistoryResponse {
  repeated ChatMessage messages = 1;
  int64 next_seq = 2;
}

message GetChatAttachmentRequest {
  string message_id = 1;
  string attachment_id = 2;
}

message ChatAttachmentChunk {
  bytes data = 1;
  bool is_last = 2;
}

