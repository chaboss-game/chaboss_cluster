listen_host: "192.168.0.110"
listen_port: 48055

# OpenAI-совместимый HTTP API (для OpenCLaw и др.)
http_listen_host: "0.0.0.0"
http_listen_port: 8055
# openai_api_key: "sk-..."  # опционально; если задан — проверка Authorization: Bearer <key>

parallel_backend: "baseline"  # baseline | accelerate | deepspeed

# Режим загрузки модели: fit_in_cluster (модель влезает) | streaming_chunks (по частям)
model_load_mode: "fit_in_cluster"
# Использование свободных ресурсов (VRAM/RAM) в процентах под модель (1-100)
resource_usage_percent: 75

# Initial static list of workers.
workers:
  - host: "192.168.0.109"
    port: 48055
    auth_token: "win10_test"
  - host: "192.168.0.111"
    port: 48055
    auth_token: "kubuntu25_test"

